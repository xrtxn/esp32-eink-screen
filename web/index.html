<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Configuration</title>
        <link rel="stylesheet" href="static/pico.min.css" />

        <style>
            /* CSS_PLACEHOLDER */
        </style>
    </head>

    <body>
        <div class="container">
            <nav>
                <ul>
                    <li><strong>Settings</strong></li>
                </ul>
                <ul>
                    <li><a href="#wifi-config" class="contrast">Wifi</a></li>
                    <li><a href="#" class="contrast">Credentials</a></li>
                    <li><a href="#" class="contrast">Calendar</a></li>
                </ul>
            </nav>
        </div>
        <div class="container wifi-config">
            <h1>Wifi</h1>
            <fieldset role="group">
                <input
                    name="wifi-ssid"
                    id="wifi-ssid"
                    placeholder="SSID"
                    minlength="1"
                    maxlength="32"
                />
                <input
                    type="password"
                    id="wifi-password"
                    name="wifi-password"
                    placeholder="Password"
                    autocomplete="current-password"
                    minlength="8"
                    maxlength="32"
                />
                <input type="submit" value="Submit" onclick="sendData()" />
            </fieldset>
        </div>
        <script>
            const sendData = async () => {
                const ssid = document.getElementById("wifi-ssid").value;
                const pass = document.getElementById("wifi-password").value;

                console.log("SSID:", ssid);
                console.log("Password:", pass);

                try {
                    const response = await fetch("/api/config/wifi", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json",
                        },
                        body: JSON.stringify({
                            ssid: ssid,
                            password: pass,
                        }),
                    });

                    if (response.ok) {
                        console.log("Configuration updated successfully");
                    } else {
                        console.error("Failed to update configuration");
                    }
                } catch (error) {
                    console.error("Error:", error);
                }
            };
        </script>
    </body>
</html>
