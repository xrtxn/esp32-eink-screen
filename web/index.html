<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Configuration</title>
        <link rel="stylesheet" href="static/pico.min.css" />

        <style>
            /* CSS_PLACEHOLDER */
            #caldav-config {
                opacity: 0;
                transition:
                    opacity 0.5s ease-out,
                    transform 0.5s ease-out;
                visibility: hidden;
            }
            #caldav-config.visible {
                opacity: 1;
                visibility: visible;
            }
        </style>
    </head>

    <body>
        <div class="container">
            <nav>
                <ul>
                    <li><strong>Credentials</strong></li>
                </ul>
                <ul>
                    <li>
                        <a href="/" class="contrast">Credentials</a>
                    </li>
                    <li>
                        <a href="/display_config" class="contrast">Calendar</a>
                    </li>
                </ul>
            </nav>
        </div>

        <div class="container" id="wifi-config">
            <h2>Wifi</h2>
            <fieldset role="group">
                <input
                    name="wifi-ssid"
                    id="wifi-ssid"
                    placeholder="SSID"
                    minlength="1"
                    maxlength="32"
                />
                <input
                    type="password"
                    id="wifi-password"
                    name="wifi-password"
                    placeholder="Password"
                    autocomplete="current-password"
                    minlength="8"
                    maxlength="32"
                />
                <input type="submit" value="Submit" onclick="sendWifiData()" />
            </fieldset>
        </div>

        <div class="container" id="caldav-config">
            <h2>Caldav credentials</h2>
            <fieldset role="group">
                <input
                    name="caldav-username"
                    id="caldav-username"
                    placeholder="Username"
                    minlength="1"
                    maxlength="32"
                />
                <input
                    type="password"
                    id="caldav-password"
                    name="caldav-password"
                    placeholder="Password"
                    autocomplete="current-password"
                    minlength="6"
                    maxlength="32"
                />
            </fieldset>
            <input
                type="url"
                id="caldav-url"
                name="caldav-url"
                placeholder="URL"
                minlength="1"
                maxlength="128"
            />
            <fieldset role="group">
                <input
                    type="submit"
                    value="Submit"
                    onclick="sendCaldavData()"
                />
            </fieldset>
        </div>

        <dialog id="success-dialog">
            <article>
                <header>
                    <button
                        aria-label="Close"
                        rel="prev"
                        onclick="
                            document.getElementById('success-dialog').close()
                        "
                    ></button>
                    <p>
                        <strong>Successfully saved config!</strong>
                    </p>
                </header>
                <p>You can now reboot the device</p>
            </article>
        </dialog>

        <dialog id="error-dialog">
            <article>
                <header>
                    <button
                        aria-label="Close"
                        rel="prev"
                        onclick="
                            document.getElementById('error-dialog').close()
                        "
                    ></button>
                    <p>
                        <strong>Error saving config!</strong>
                    </p>
                </header>
                <p>
                    There was a problem saving your configuration. Please try
                    again.
                </p>
            </article>
        </dialog>

        <script>
            const checkNetworkConnection = async () => {
                try {
                    // Google's 204 endpoint. Returns 0 bytes of body data.
                    const url = `https://clients3.google.com/generate_204`;

                    const response = await fetch(url, {
                        method: "HEAD",
                        mode: "no-cors",
                        cache: "no-store",
                    });

                    return true;
                } catch (error) {
                    return false;
                }
            };

            const sendData = async (endpoint, payload) => {
                try {
                    const response = await fetch(endpoint, {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json",
                        },
                        body: JSON.stringify(payload),
                    });

                    if (response.ok) {
                        console.log("Configuration updated successfully");
                        document.getElementById("success-dialog").showModal();
                    } else {
                        console.error("Failed to update configuration");
                        document.getElementById("error-dialog").showModal();
                    }
                } catch (error) {
                    console.error("Error:", error);
                    document.getElementById("error-dialog").showModal();
                }
            };

            const sendWifiData = async () => {
                const ssid = document.getElementById("wifi-ssid");
                const pass = document.getElementById("wifi-password");

                if (!ssid.value) ssid.setAttribute("aria-invalid", "true");
                else ssid.removeAttribute("aria-invalid");

                if (!pass.value) pass.setAttribute("aria-invalid", "true");
                else pass.removeAttribute("aria-invalid");

                if (!ssid.value || !pass.value) return;

                console.log("SSID:", ssid.value);
                console.log("Password:", pass.value);

                sendData("/api/config/wifi", {
                    ssid: ssid.value,
                    password: pass.value,
                });
            };

            const sendCaldavData = async () => {
                const user = document.getElementById("caldav-username");
                const pass = document.getElementById("caldav-password");
                const url = document.getElementById("caldav-url");

                if (!user.value) user.setAttribute("aria-invalid", "true");
                else user.removeAttribute("aria-invalid");

                if (!pass.value) pass.setAttribute("aria-invalid", "true");
                else pass.removeAttribute("aria-invalid");

                if (!url.value) url.setAttribute("aria-invalid", "true");
                else url.removeAttribute("aria-invalid");

                if (!user.value || !pass.value || !url.value) return;

                console.log("Username:", user.value);
                console.log("Password:", pass.value);
                console.log("URL:", url.value);

                sendData("/api/config/caldav", {
                    username: user.value,
                    password: pass.value,
                    url: url.value,
                });
            };

            const initializeCaldavConfig = async () => {
                const target = document.getElementById("caldav-config");

                const tryConnecting = async () => {
                    if (await checkNetworkConnection()) {
                        target.classList.add("visible");
                        return true;
                    }
                    return false;
                };

                const connected = await tryConnecting();

                if (!connected) {
                    const interval = setInterval(async () => {
                        if (await tryConnecting()) {
                            clearInterval(interval);
                        }
                    }, 1000);
                }
            };

            initializeCaldavConfig();
        </script>
    </body>
</html>
