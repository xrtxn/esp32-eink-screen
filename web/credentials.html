<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Configuration</title>
        <link rel="stylesheet" href="static/pico.min.css" />
        <link
            rel="icon"
            type="image/svg+xml"
            href="data:image/svg+xml;base64,/* FAVICON_PLACEHOLDER */"
        />

        <style>
            /* CSS_PLACEHOLDER */
        </style>
    </head>

    <body>
        <div class="container">
            <nav>
                <ul>
                    <li><strong>Credentials</strong></li>
                </ul>
                <ul>
                    <li>
                        <a href="/" class="contrast">Credentials</a>
                    </li>
                    <li>
                        <a href="/display_config" class="contrast">Calendar</a>
                    </li>
                </ul>
            </nav>
        </div>

        <div class="container" id="wifi-config">
            <h2>Wifi</h2>
            <fieldset role="group">
                <input
                    name="wifi-ssid"
                    id="wifi-ssid"
                    placeholder="SSID"
                    minlength="1"
                    maxlength="32"
                />
                <input
                    type="password"
                    id="wifi-password"
                    name="wifi-password"
                    placeholder="Password"
                    autocomplete="current-password"
                    minlength="8"
                    maxlength="32"
                />
                <input type="submit" value="Submit" onclick="sendWifiData()" />
            </fieldset>
        </div>

        <div class="container" id="caldav-config">
            <h2>Caldav credentials</h2>
            <fieldset role="group">
                <input
                    name="caldav-username"
                    id="caldav-username"
                    placeholder="Username"
                    minlength="1"
                    maxlength="32"
                />
                <input
                    type="password"
                    id="caldav-password"
                    name="caldav-password"
                    placeholder="Password"
                    autocomplete="current-password"
                    minlength="6"
                    maxlength="32"
                />
            </fieldset>
            <fieldset role="group" id="url-container">
                <input
                    type="url"
                    id="caldav-url"
                    name="caldav-url"
                    placeholder="URL"
                    minlength="1"
                    maxlength="128"
                    aria-describedby="url-helper"
                    oninput="
                        document.getElementById('caldav-submit').disabled =
                            true;
                        calendar_endpoint = null;
                    "
                />
                <input
                    class="secondary"
                    type="submit"
                    value="Validate"
                    id="caldav-validate"
                    onclick="validateUrl()"
                />
            </fieldset>
            <small id="url-helper" style="display: none"></small>
            <fieldset role="group">
                <input
                    type="submit"
                    value="Submit"
                    id="caldav-submit"
                    onclick="sendCaldavData()"
                    disabled
                />
            </fieldset>
        </div>

        <dialog id="success-dialog">
            <article>
                <header>
                    <button
                        aria-label="Close"
                        rel="prev"
                        onclick="
                            document.getElementById('success-dialog').close()
                        "
                    ></button>
                    <p>
                        <strong>Successfully saved config!</strong>
                    </p>
                </header>
                <p>You can now reboot the device</p>
            </article>
        </dialog>

        <dialog id="error-dialog">
            <article>
                <header>
                    <button
                        aria-label="Close"
                        rel="prev"
                        onclick="
                            document.getElementById('error-dialog').close()
                        "
                    ></button>
                    <p>
                        <strong>Error saving config!</strong>
                    </p>
                </header>
                <p>
                    There was a problem saving your configuration. Please try
                    again.
                </p>
            </article>
        </dialog>

        <script>
            let calendar_endpoint = null;

            const checkNetworkConnection = async () => {
                try {
                    // Google's 204 endpoint.
                    const url = `https://clients3.google.com/generate_204`;

                    const response = await fetch(url, {
                        method: "HEAD",
                        mode: "no-cors",
                        cache: "no-store",
                    });

                    return true;
                } catch (error) {
                    return false;
                }
            };

            const sendData = async (endpoint, payload, modal) => {
                try {
                    const response = await fetch(endpoint, {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json",
                        },
                        body: JSON.stringify(payload),
                    });

                    if (response.ok) {
                        console.log("Configuration updated successfully");
                        if (modal) {
                            document
                                .getElementById("success-dialog")
                                .showModal();
                        }
                    } else {
                        console.error("Failed to update configuration");
                        if (modal) {
                            document.getElementById("error-dialog").showModal();
                        }
                    }
                } catch (error) {
                    console.error("Error:", error);
                    if (modal) {
                        document.getElementById("error-dialog").showModal();
                    }
                }
            };

            const sendWifiData = async () => {
                const ssid = document.getElementById("wifi-ssid");
                const pass = document.getElementById("wifi-password");

                if (!ssid.value) {
                    ssid.setAttribute("aria-invalid", "true");
                } else {
                    ssid.removeAttribute("aria-invalid");
                }

                if (!pass.value) {
                    pass.setAttribute("aria-invalid", "true");
                } else {
                    pass.removeAttribute("aria-invalid");
                }

                if (!ssid.value || !pass.value) {
                    return;
                }

                console.log("SSID:", ssid.value);
                console.log("Password:", pass.value);

                sendData(
                    "/api/config/wifi",
                    {
                        ssid: ssid.value,
                        password: pass.value,
                    },
                    true,
                );
            };

            const validateUrl = async () => {
                const urlInput = document.getElementById("caldav-url");
                const helper = document.getElementById("url-helper");
                const container = document.getElementById("url-container");

                const setStatus = (invalid, message) => {
                    urlInput.setAttribute("aria-invalid", invalid);
                    container.setAttribute("aria-invalid", invalid);
                    helper.textContent = message;
                    helper.style.display = "block";
                };

                const normalizeUrl = async (url) => {
                    let input = url.trim();

                    // Upgrade http:// to https://
                    if (input.startsWith("http://")) {
                        input = "https://" + input.slice(7);
                    }

                    // Add https:// if no protocol is found
                    if (!input.startsWith("https://")) {
                        input = "https://" + input;
                    }

                    try {
                        const parsed = new URL(input);
                        if (
                            parsed.protocol !== "https:" ||
                            !parsed.hostname.includes(".")
                        ) {
                            return null;
                        }
                        if (
                            parsed.hostname
                                .split(".")
                                .some((label) => label.length === 0)
                        ) {
                            return null;
                        }
                        return parsed.href;
                    } catch {
                        return null;
                    }
                };

                const url = await normalizeUrl(urlInput.value);

                if (!url) {
                    setStatus("true", "Please provide a valid URL!");
                    document.getElementById("caldav-submit").disabled = true;
                    document.getElementById("caldav-validate").style =
                        "background-color: var(--pico-del-color);border-color: var(--pico-del-color)";
                    return;
                }

                try {
                    const response = await fetch(
                        "/api/config/caldav/endpoint",
                        {
                            method: "POST",
                            headers: {
                                "Content-Type": "application/json",
                            },
                            body: JSON.stringify({ url: url }),
                        },
                    );

                    if (response.ok) {
                        setStatus("false", "Looks good!");
                        const data = await response.json();
                        calendar_endpoint = data.endpoint;
                        document.getElementById("caldav-submit").disabled =
                            false;
                        document.getElementById("caldav-validate").style =
                            "background-color: var(--pico-ins-color);border-color: var(--pico-ins-color)";
                        console.log("Validated endpoint:", calendar_endpoint);
                    } else {
                        setStatus("true", "URL validation failed!");
                        document.getElementById("caldav-submit").disabled =
                            true;
                        document.getElementById("caldav-validate").style =
                            "background-color: var(--pico-del-color);border-color: var(--pico-del-color)";
                    }
                } catch (error) {
                    setStatus(
                        "true",
                        "Error connecting to validation service.",
                    );
                    console.error("Error:", error);
                }
            };

            const sendCaldavData = async () => {
                const user = document.getElementById("caldav-username");
                const pass = document.getElementById("caldav-password");

                if (!user.value) {
                    user.setAttribute("aria-invalid", "true");
                } else {
                    user.removeAttribute("aria-invalid");
                }

                if (!pass.value) {
                    pass.setAttribute("aria-invalid", "true");
                } else {
                    pass.removeAttribute("aria-invalid");
                }

                if (!calendar_endpoint) {
                    document
                        .getElementById("caldav-url")
                        .setAttribute("aria-invalid", "true");
                } else {
                    document
                        .getElementById("caldav-url")
                        .removeAttribute("aria-invalid");
                }

                if (!user.value || !pass.value || !calendar_endpoint) {
                    return;
                }

                console.log("Username:", user.value);
                console.log("Password:", pass.value);
                console.log("URL:", calendar_endpoint);

                sendData(
                    "/api/config/caldav",
                    {
                        username: user.value,
                        password: pass.value,
                        url: calendar_endpoint,
                    },
                    true,
                );
            };

            const initializeCaldavConfig = async () => {
                const target = document.getElementById("caldav-config");
                const inputs = target.querySelectorAll("input");

                inputs.forEach((input) => (input.disabled = true));

                const tryConnecting = async () => {
                    if (await checkNetworkConnection()) {
                        inputs.forEach((input) => {
                            if (input.id !== "caldav-submit") {
                                input.disabled = false;
                            }
                        });
                        return true;
                    }
                    return false;
                };

                const connected = await tryConnecting();

                if (!connected) {
                    const interval = setInterval(async () => {
                        if (await tryConnecting()) {
                            clearInterval(interval);
                        }
                    }, 1000);
                }
            };

            initializeCaldavConfig();
        </script>
    </body>
</html>
