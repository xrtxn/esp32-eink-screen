<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Configuration</title>
        <link
            rel="icon"
            type="image/svg+xml"
            href="data:image/svg+xml;base64,/* FAVICON_PLACEHOLDER */"
        />

        <link rel="stylesheet" href="static/pico.min.css" />

        <style>
            /* CSS_PLACEHOLDER */
        </style>
    </head>

    <body>
        <div class="container">
            <nav>
                <ul>
                    <li><strong>Display settings</strong></li>
                </ul>
                <ul>
                    <li>
                        <a href="/" class="contrast">Credentials</a>
                    </li>
                    <li>
                        <a href="/display_config" class="contrast">Calendar</a>
                    </li>
                </ul>
            </nav>
        </div>

        <div class="container" id="network-display">
            <article aria-busy="true" id="network-card">
                Checking internet connection
            </article>

            <script>
                const networkCard = document.querySelector("#network-card");
                const checkNetworkConnectionThirdParty = async () => {
                    try {
                        // Google's 204 endpoint.
                        const url = `https://clients3.google.com/generate_204`;

                        const response = await fetch(url, {
                            method: "HEAD",
                            mode: "no-cors",
                            cache: "no-store",
                        });

                        return true;
                    } catch (error) {
                        return false;
                    }
                };

                // Check the internet connection on page load
                window.addEventListener("load", async () => {
                    const isConnected =
                        await checkNetworkConnectionThirdParty();
                    networkCard.textContent = isConnected
                        ? "Internet connection is available."
                        : "No internet connection detected.";
                    networkCard.setAttribute("aria-busy", "false");
                    networkCard.style.backgroundColor = isConnected
                        ? "var(--pico-ins-color)"
                        : "var(--pico-del-color)";
                });
            </script>
        </div>

        <div class="container" id="display-config">
            <label for="display-hours-range">
                Displayed hours: <span id="hours-value">16</span>
            </label>

            <input
                id="display-hours-range"
                type="range"
                value="16"
                min="1"
                max="24"
            />
            <script>
                const rangeInput = document.querySelector(
                    "#display-hours-range",
                );
                const valueDisplay = document.querySelector("#hours-value");

                // Create a reusable function to update the UI
                const updateDisplay = () => {
                    valueDisplay.textContent = rangeInput.value;
                };

                // Listen for input changes
                rangeInput.addEventListener("input", updateDisplay);

                // Initialize the display on page load
                updateDisplay();
            </script>
        </div>

        <div class="container">
            <h3>Calendar selection</h3>
            <details
                class="dropdown"
                id="calendar-dropdown"
                aria-disabled="true"
                style="pointer-events: none; opacity: 0.5"
            >
                <summary aria-busy="true">
                    Please wait while we fetch your calendar list...
                </summary>
                <ul id="calendar-list"></ul>
                <script>
                    window.addEventListener("load", async () => {
                        const dropdown =
                            document.querySelector("#calendar-dropdown");
                        const summary = dropdown.querySelector("summary");
                        const ul = document.querySelector("#calendar-list");

                        try {
                            const response = await fetch(
                                "/api/config/caldav/calendars",
                            );
                            if (!response.ok) {
                                throw new Error("Network response was not ok");
                            }
                            const calendars = await response.json();
                            ul.innerHTML = "";

                            calendars.forEach((cal) => {
                                const li = document.createElement("li");
                                const label = document.createElement("label");
                                const input = document.createElement("input");
                                input.type = "checkbox";

                                const name =
                                    cal.display_name ||
                                    cal.name ||
                                    cal.displayname ||
                                    "Unknown";
                                const id = cal.href || cal.id || name;
                                input.name = id;

                                label.appendChild(input);
                                label.appendChild(
                                    document.createTextNode(` ${name}`),
                                );
                                li.appendChild(label);
                                ul.appendChild(li);
                            });

                            summary.textContent = "Select calendars";
                            summary.removeAttribute("aria-busy");
                            dropdown.removeAttribute("aria-disabled");
                            dropdown.removeAttribute("style");
                        } catch (error) {
                            console.error("Failed to fetch calendars:", error);
                            summary.textContent = "Failed to load calendars.";
                            summary.removeAttribute("aria-busy");
                        }
                    });
                </script>
            </details>
        </div>
    </body>
</html>
