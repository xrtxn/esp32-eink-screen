<!doctype html>
<html>
    <head>
        <title>Configuration</title>
        <script src="static/htmx.min.js"></script>
    </head>
    <body>
        <h2>Hello world</h2>
        <div id="parent-div">
            <button
                hx-post="/clicked"
                hx-trigger="click"
                hx-target="#parent-div"
                hx-swap="outerHTML"
            >
                Click Me!
            </button>
        </div>
    </body>
</html>
